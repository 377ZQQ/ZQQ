<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQQ · 作品集</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-content">
        <div class="title-group">
            <h1>作品集</h1>
            <span class="subtitle">Art Collection</span>
        </div>

        <div class="header-actions">
            <button id="themeToggle" class="theme-btn">🌙</button>

            <div class="upload-area">
                <input type="file" id="fileInput" accept="image/*" multiple hidden>
                <label for="fileInput" class="upload-btn">上传新作品</label>
            </div>
        </div>
    </div>
</header>


<main>
    <section class="gallery-grid" id="gallery"></section>
</main>

<div id="lightbox" class="lightbox">
    <span class="close-btn">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
