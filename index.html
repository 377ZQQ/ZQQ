<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZQQ 二次元画廊 | 作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#E53E3E', // 樱花红
            sakura: '#FFF5F5', // 浅粉背景
            darkBlue: '#2D3748' // 绀蓝
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s ease-out'
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            fadeIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-sakura text-gray-800">

  <header class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-pink-100 h-16 flex items-center">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-2 font-bold text-xl text-darkBlue">
        <i class="fa fa-heart text-primary"></i> ZQQ GALLERY
      </div>
      <nav class="hidden md:flex gap-6 font-medium">
        <a href="#collection" class="hover:text-primary">陈列馆</a>
        <a href="#upload" class="hover:text-primary">投递处</a>
      </nav>
    </div>
  </header>

  <main class="pt-24">
    <section class="text-center py-12">
      <h1 class="text-4xl md:text-5xl font-bold text-darkBlue mb-4">收藏每一个 <span class="text-primary">心动瞬间</span></h1>
      <p class="text-gray-500">ZQQ 二次元艺术画廊 - 展示你的二次元创作</p>
    </section>

    <section id="collection" class="container mx-auto px-6 py-10">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group">
          <div class="aspect-video overflow-hidden">
            <img src="saber1.png" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://picsum.photos/400/300?text=Wait+for+Image'">
          </div>
          <div class="p-4">
            <h3 class="font-bold">作品：载入页设计 A</h3>
            <p class="text-sm text-gray-400">二次元风格 · 载入界面</p>
          </div>
        </div>

        <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group">
          <div class="aspect-video overflow-hidden">
            <img src="saber2.png" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://picsum.photos/400/300?text=Wait+for+Image'">
          </div>
          <div class="p-4">
            <h3 class="font-bold">作品：载入页设计 B</h3>
            <p class="text-sm text-gray-400">二次元风格 · 载入界面</p>
          </div>
        </div>

        <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group">
          <div class="aspect-video overflow-hidden">
            <img src="saber3.png" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://picsum.photos/400/300?text=Wait+for+Image'">
          </div>
          <div class="p-4">
            <h3 class="font-bold">Ave Mujica 直播间装饰</h3>
            <p class="text-sm text-gray-400">BanG Dream! · UI设计</p>
          </div>
        </div>

      </div>
    </section>

    <section id="upload" class="bg-white py-16">
      <div class="container mx-auto px-6 max-w-3xl text-center">
        <h2 class="text-3xl font-bold mb-8">创作投递</h2>
        <div class="border-4 border-dashed border-pink-100 rounded-3xl p-12 hover:border-primary transition-colors cursor-pointer relative">
          <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" multiple>
          <i class="fa fa-cloud-upload text-5xl text-primary mb-4"></i>
          <p class="text-gray-500 font-medium">点击或拖拽作品到这里</p>
          <p class="text-xs text-gray-400 mt-2">支持 JPG/PNG，图片将立即显示在下方预览</p>
        </div>
        
        <div id="previewGrid" class="grid grid-cols-2 gap-4 mt-8"></div>
      </div>
    </section>
  </main>

  <footer class="bg-darkBlue text-gray-400 py-12 text-center">
    <p>© 2025 ZQQ GALLERY. 所有的热爱都有归宿。</p>
  </footer>

  <script>
    const imageInput = document.getElementById('imageInput');
    const previewGrid = document.getElementById('previewGrid');

    // 图片上传实时预览逻辑
    imageInput.addEventListener('change', function() {
      const files = Array.from(this.files);
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const div = document.createElement('div');
          div.className = "animate-fade-in bg-sakura p-2 rounded-lg border border-pink-100";
          div.innerHTML = `
            <img src="${e.target.result}" class="rounded-md w-full aspect-video object-cover mb-2">
            <p class="text-xs truncate font-medium text-primary">${file.name}</p>
          `;
          previewGrid.appendChild(div);
        }
        reader.readAsDataURL(file);
      });
    });
  </script>
</body>
</html>
