<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ave Mujica x K-ON! Gallery</title>
    <style>
        /* 直接集成你提供的 CSS 核心风格 */
        :root {
            --mujica-purple: rgba(30, 10, 40, 0.8);
            --mujica-border: #4a2d5e;
            --mujica-text: #e0d0f0;
        }

        body {
            /* 模仿 CSS 中的背景遮罩和暗色调 */
            background-color: #0a050f;
            background-image: linear-gradient(135deg, #1a0a2a 0%, #050510 100%);
            color: var(--mujica-text);
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 标题部分：参考 CSS 中的 .title-label 风格 */
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px #8a4fff;
            border-bottom: 1px solid var(--mujica-border);
            padding-bottom: 10px;
            letter-spacing: 5px;
            margin-bottom: 50px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 900px;
            width: 100%;
        }

        /* 模仿 CSS 中的 .chat-item 和面板质感 */
        .card {
            background: rgba(45, 20, 70, 0.3);
            backdrop-filter: blur(10px); /* 磨砂玻璃 */
            border: 1px solid var(--mujica-border);
            border-radius: 4px; /* 偏向直角的硬朗风格 */
            padding: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* 悬浮时产生类似直播间高亮的效果 */
        .card:hover {
            background: rgba(60, 30, 90, 0.5);
            box-shadow: 0 0 30px rgba(138, 79, 255, 0.3);
            border-color: #8a4fff;
        }

        img {
            width: 100%;
            height: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: block;
        }

        /* 底部信息栏：参考 CSS 的通用文本颜色 */
        .info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #b0a0c0;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid #8a4fff;
            padding-left: 10px;
        }

        /* 装饰元素 */
        .card::before {
            content: "DESTRUCTION";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 10px;
            color: rgba(138, 79, 255, 0.5);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>AVE MUJICA // SECTOR</h1>

    <div class="gallery">
        <div class="card">
            <img src="img-1754359231623e26b044d67e45c4b16b3d5dc2c170abf.jpg" alt="K-ON 1">
            <div class="info">
                <span>SUBJECT: HTT_GROUP</span>
                <span>STATUS: ACTIVE</span>
            </div>
        </div>

        <div class="card">
            <img src="img-1754359487008459ef81c77935bbdcc848b04fff6e261.jpg" alt="K-ON 2">
            <div class="info">
                <span>SUBJECT: MUSIC_UNIT</span>
                <span>STATUS: STANDBY</span>
            </div>
        </div>
    </div>

</body>
</html>
