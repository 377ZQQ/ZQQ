<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKNIGHTS STYLE GALLERY</title>
    <style>
        /* 导入方舟常用的黑体感字体 */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');

        body {
            background-color: #1a1a1a; /* 深色背景 */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* 工业背景格线 */
            color: #ffffff;
            font-family: 'Oswald', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 方舟标志性的顶部装饰条 */
        header {
            width: 100%;
            max-width: 1000px;
            border-left: 8px solid #ffcf00; /* 方舟黄 */
            padding-left: 15px;
            margin-bottom: 50px;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #ffcf00;
            letter-spacing: 4px;
        }

        /* 装饰用的三角点缀 */
        .decor-dot {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-align: right;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        /* 仿方舟干员立绘卡片 */
        .card {
            position: relative;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px;
            /* 关键：切角效果 */
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #ffcf00;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 207, 0, 0.2);
        }

        .card-inner {
            background: #121212;
            padding: 10px;
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        img {
            width: 100%;
            height: auto;
            filter: grayscale(20%); /* 略微降低饱和度增加质感 */
            transition: 0.5s;
        }

        .card:hover img {
            filter: grayscale(0%);
        }

        /* 卡片底部的信息栏 */
        .info-bar {
            margin-top: 10px;
            padding: 10px;
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag {
            background: #ffcf00;
            color: #000;
            padding: 2px 8px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .code {
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Archive / Operation: K-ON!</h1>
        <div class="subtitle">罗德岛档案库 - 樱丘支部</div>
        <div class="decor-dot">SYSTEM READY<br>ACCESS GRANTED</div>
    </header>

    <div class="gallery">
        <div class="card">
            <div class="card-inner">
                <img src="img-1754359231623e26b044d67e45c4b16b3d5dc2c170abf.jpg" alt="Art 1">
                <div class="info-bar">
                    <span class="tag">TOP SECRET</span>
                    <span class="code">ID: 001-HTT</span>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-inner">
                <img src="img-1754359487008459ef81c77935bbdcc848b04fff6e261.jpg" alt="Art 2">
                <div class="info-bar">
                    <span class="tag">PROMOTED</span>
                    <span class="code">ID: 002-MUSIC</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
