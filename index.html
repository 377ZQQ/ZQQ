<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQQ Gallery | 幻想画廊</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ================= 主题变量 ================= */
        :root {
            --bg-color: #0a0a0c;
            --bg-gradient-1: rgba(255,215,0,0.06);
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #ffd700;
            --accent-soft: rgba(255,215,0,0.25);
        }

        [data-theme="blue"] {
            --bg-color: #070b12;
            --bg-gradient-1: rgba(80,150,255,0.08);
            --card-bg: #0f1623;
            --text-main: #e6ecff;
            --text-sub: #9aa7c7;
            --accent: #5aa2ff;
            --accent-soft: rgba(90,162,255,0.25);
        }

        /* ================= 全局 ================= */
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-main);
            background: 
                radial-gradient(1200px 600px at 50% -20%, var(--bg-gradient-1), transparent 40%),
                linear-gradient(180deg, var(--bg-color), #050507);
            transition: background 0.6s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* ================= Header ================= */
        header {
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(15px);
            background: rgba(20, 20, 25, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-content {
            max-width: 1200px; margin: 0 auto;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }

        .title-group h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .subtitle { font-size: 12px; color: var(--accent); letter-spacing: 1px; }

        .header-actions { display: flex; align-items: center; gap: 16px; }

        .theme-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); padding: 8px; border-radius: 8px; cursor: pointer;
        }

        .upload-btn {
            background: var(--accent); color: #000; padding: 10px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        /* ================= 布局分区 ================= */
        .section-container {
            max-width: 1400px; margin: 40px auto; padding: 0 5%;
        }

        .section-title {
            font-size: 1.2rem; color: var(--text-sub); margin-bottom: 25px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px; margin-bottom: 50px;
        }

        .gallery-item {
            background: var(--card-bg); border-radius: 14px; overflow: hidden;
            aspect-ratio: 3 / 4; cursor: pointer;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
            transition: 0.35s ease;
            animation: fadeInUp 0.6s ease both;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 22px 60px var(--accent-soft);
        }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 灯箱 */
        .lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 5px; }
        .close-btn { position: absolute; top: 20px; right: 40px; font-size: 50px; color: #fff; cursor: pointer; }
    </style>
</head>

<body>

<header>
    <div class="header-content">
        <div class="title-group">
            <h1>ZQQ GALLERY</h1>
            <span class="subtitle">舞台已经准备就绪</span>
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="theme-btn">🌙</button>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
            <label for="fileInput" class="upload-btn">上传作品</label>
        </div>
    </div>
</header>

<main>
    <section class="section-container">
        <div class="section-title"><span>01</span> 作品陈列馆 (已有图片)</div>
        <div class="gallery-grid" id="static-gallery">
            </div>
    </section>

    <section class="section-container">
        <div class="section-title"><span>02</span> 创作投递处 (上传预览)</div>
        <div class="gallery-grid" id="preview-gallery">
            </div>
    </section>
</main>

<div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeLightbox">×</span>
    <img id="lightboxImg" src="" alt="preview">
</div>

<script>
    /* ================= 主题切换 ================= */
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
        const isBlue = document.documentElement.getAttribute('data-theme') === 'blue';
        document.documentElement.setAttribute('data-theme', isBlue ? 'dark' : 'blue');
        themeBtn.textContent = isBlue ? '🌙' : '☀️';
    });

    /* ================= 核心逻辑 ================= */
    const staticGallery = document.getElementById('static-gallery');
    const previewGallery = document.getElementById('preview-gallery');
    const fileInput = document.getElementById('fileInput');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    // --- 【修改这里】：填写你仓库 img 文件夹里的文件名 ---
    const initialImages = [
        'img/saber1.png',
        'img/saber2.png',
        'img/saber3.png'
    ];

    // 通用渲染函数
    function createCard(src, container) {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        const img = document.createElement('img');
        img.src = src;
        img.onerror = () => div.style.display = 'none'; // 路径错则隐藏
        
        div.appendChild(img);
        div.onclick = () => {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        };
        container.appendChild(div);
    }

    // 1. 初始化加载已有作品
    initialImages.forEach(url => createCard(url, staticGallery));

    // 2. 处理上传预览 (新图会出现在第二部分)
    fileInput.addEventListener('change', () => {
        [...fileInput.files].forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${e.target.result}">`;
                div.onclick = () => {
                    lightboxImg.src = e.target.result;
                    lightbox.style.display = 'flex';
                };
                previewGallery.prepend(div); // 上传的放在第二部分最前面
            };
            reader.readAsDataURL(file);
        });
    });

    // 3. 灯箱控制
    document.getElementById('closeLightbox').onclick = () => lightbox.style.display = 'none';
    lightbox.onclick = e => { if (e.target === lightbox) lightbox.style.display = 'none'; };
</script>

</body>
</html>
